# surface-watch — Scope definition
# Defines the perimeter to monitor.
#
# Multi-organisation : chaque organisation correspond à une entité Saur Group.
# Les identifiants (id) proviennent de UI-SAUR/organisation.yaml.
# La couleur de marque est utilisée dans la cartographie (bordure des nœuds).
#
# Formats supportés :
#   Forme courte (rétrocompatible) :
#     domains:
#       - example.com
#
#   Forme longue (multi-org) :
#     organizations:
#       - id: saur_france
#         name: Saur France
#         brand_color: "#00B2A9"
#         domains:
#           - saur.fr
#         ip_ranges:
#           - 198.51.100.0/24

# ── Organisations surveillées ──────────────────────────────────────────────
organizations:

  - id: saur_france
    name: "Saur France"
    brand_color: "#00B2A9"          # Saur Glacier Turquoise
    domains:
      - saur.fr
      # - saur.com
    ip_ranges: []

