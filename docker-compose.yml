services:
  surface-watch:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    ports:
      - "8080:8080"
    restart: unless-stopped
    cap_add:
      - NET_RAW       # Required for nmap SYN scanning
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/stats')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
